name: Kappa Test Suite

on:
  push:
    branches:
      - claude/terra-nature-kappa-assistant-*
      - main
      - develop
    paths:
      - 'kappa/**'
      - 'tests/kappa/**'
      - '.github/workflows/kappa-test.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'kappa/**'
      - 'tests/kappa/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r kappa/requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          # Stop the build if there are Python syntax errors or undefined names
          flake8 kappa --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 kappa --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run Kappa unit tests
        run: |
          python -m pytest kappa/tests/test_engine.py -v --tb=short

      - name: Run Kappa API tests
        run: |
          python -m pytest kappa/tests/test_api.py -v --tb=short

      - name: Run E2E Voice Flow tests
        run: |
          python -m pytest tests/kappa/test_kappa_voice_flow.py -v --tb=short

      - name: Run Terra-Kappa integration tests
        run: |
          python -m pytest tests/kappa/test_terra_kappa_integration.py -v --tb=short

      - name: Generate test report
        if: always()
        run: |
          python -m pytest kappa/tests/ tests/kappa/ --tb=short -v --junit-xml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results-${{ matrix.python-version }}
          path: test-results.xml

      - name: Report test summary
        if: always()
        run: |
          echo "Test Summary:"
          python -m pytest kappa/tests/ tests/kappa/ --tb=no -q

  code-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r kappa/requirements.txt
          pip install pytest-cov coverage

      - name: Run tests with coverage
        run: |
          pytest kappa/tests/ tests/kappa/ --cov=kappa --cov-report=xml --cov-report=html --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: kappa
          name: kappa-coverage

      - name: Archive coverage reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: htmlcov

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy types-all

      - name: Run mypy type checks
        run: |
          mypy kappa --ignore-missing-imports --no-error-summary || true
